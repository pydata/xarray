channels:
  - conda-forge
platforms:
  - noarch
  - linux-64
policy:
  # all packages in months
  packages:
    python: 30
    numpy: 18
  default: 12
  # overrides for the policy
  overrides: {}
  # these packages are completely ignored
  exclude:
    - coveralls
    - pip
    - pytest
    - pytest-asyncio
    - pytest-cov
    - pytest-env
    - pytest-mypy-plugins
    - pytest-timeout
    - pytest-xdist
    - pytest-hypothesis
    - hypothesis
    - pytz
    - pytest-reportlog
    - pyarrow # transitive dependency of dask.dataframe, not an xarray dependency
  # these packages don't fail the CI, but will be printed in the report
  ignored_violations:
    - array-api-strict
    # h5netcdf 1.8.0 introduced compatibility features with netcdf4 that we
    # rely on, so we intentionally require a newer minimum than the policy
    # https://github.com/pydata/xarray/issues/10657#issuecomment-3711095986
    - h5netcdf
